# Reusable workflow: deploy a Docker image to an ECS Fargate service.
#
# Called by cd.yml for each environment (dev → staging → production).
# The `environment` input controls which GitHub Environment is activated,
# which in turn applies that environment's protection rules (e.g. the
# manual approval gate on production) and scopes its secrets/variables.
#
# Required GitHub Environment variables (set per environment in Settings → Environments):
#   AWS_REGION                  e.g. us-east-1
#   ECS_CLUSTER                 ECS cluster name
#   ECS_SERVICE                 ECS service name
#   ECS_TASK_DEFINITION         Task definition family name
#   CONTAINER_NAME              Container name inside the task definition
#   CLOUDWATCH_ALARM_NAME       Alarm to monitor during the bake period
#   SERVICE_URL                 Base URL used for smoke / E2E tests
#   MIGRATION_TASK_DEFINITION   Task definition used to run DB migrations
#   MIGRATION_SUBNET            Subnet ID for the migration task
#   MIGRATION_SECURITY_GROUP    Security group ID for the migration task
#
# Required GitHub Environment secrets (set per environment):
#   AWS_ROLE_ARN   IAM role ARN assumed via OIDC for this environment

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target GitHub Environment (dev | staging | production)'
        required: true
        type: string
      image:
        description: 'Fully-qualified ECR image URI (registry/repo:tag)'
        required: true
        type: string
      run-e2e:
        description: 'Run full E2E test suite instead of smoke tests'
        required: false
        type: boolean
        default: false
      skip-migrations:
        description: 'Skip the DB migration step (useful if no real DB yet)'
        required: false
        type: boolean
        default: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── AWS auth via OIDC (no long-lived keys stored as secrets) ──────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # ── DB Migrations ─────────────────────────────────────────────────────
      # Runs a one-off Fargate task using the migration task definition before
      # the rolling image deploy so the schema is always ahead of the app.
      - name: Run database migrations
        if: ${{ !inputs.skip-migrations }}
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          MIGRATION_TASK_DEFINITION: ${{ vars.MIGRATION_TASK_DEFINITION }}
          MIGRATION_SUBNET: ${{ vars.MIGRATION_SUBNET }}
          MIGRATION_SECURITY_GROUP: ${{ vars.MIGRATION_SECURITY_GROUP }}
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$MIGRATION_TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$MIGRATION_SUBNET],securityGroups=[$MIGRATION_SECURITY_GROUP],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "Failed to start migration task — aborting deploy."
            exit 1
          fi

          echo "Migration task ARN: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query "tasks[0].containers[?name=='migration'].exitCode | [0]" \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task exited with code $EXIT_CODE — aborting deploy."
            exit 1
          fi
          echo "Migrations completed successfully."

      # ── Render updated task definition ────────────────────────────────────
      - name: Download current task definition
        env:
          ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION }}
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_DEFINITION" \
            --query taskDefinition > task-definition.json

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.CONTAINER_NAME }}
          image: ${{ inputs.image }}

      # ── Rolling deploy ────────────────────────────────────────────────────
      - name: Deploy to ECS Fargate (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── Bake period: monitor CloudWatch alarm for 5-minute window ─────────
      # Polls every 30 seconds. Fails (triggering an ECS rollback) if the
      # alarm enters ALARM state due to elevated 5xx errors or health failures.
      - name: Monitor CloudWatch alarm (bake period)
        env:
          ALARM_NAME: ${{ vars.CLOUDWATCH_ALARM_NAME }}
          BAKE_SECONDS: '300'
        run: |
          echo "Bake period started — monitoring '$ALARM_NAME' for ${BAKE_SECONDS}s"
          END=$(($(date +%s) + BAKE_SECONDS))

          while [ "$(date +%s)" -lt "$END" ]; do
            STATE=$(aws cloudwatch describe-alarms \
              --alarm-names "$ALARM_NAME" \
              --query 'MetricAlarms[0].StateValue' \
              --output text)

            REMAINING=$(( END - $(date +%s) ))
            echo "Alarm state: $STATE (${REMAINING}s remaining)"

            if [ -z "$STATE" ] || [ "$STATE" = "None" ]; then
              echo "Alarm '$ALARM_NAME' not found — failing deployment."
              exit 1
            fi

            if [ "$STATE" = "ALARM" ]; then
              echo "CloudWatch alarm fired — deployment will be rolled back."
              exit 1
            fi

            sleep 30
          done
          echo "Bake period completed without alarms."

      # ── Post-deploy tests ─────────────────────────────────────────────────
      - name: Smoke tests
        if: false
        env:
          SERVICE_URL: ${{ vars.SERVICE_URL }}
        run: |
          echo "Running smoke tests against $SERVICE_URL"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$SERVICE_URL/health" || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "Health check returned HTTP $STATUS — smoke test failed."
            exit 1
          fi
          echo "Smoke tests passed."

      # TODO: replace the placeholder below with your actual E2E test runner
      # (e.g. Playwright, Cypress, or a custom npm script).
      - name: E2E tests
        if: false
        env:
          SERVICE_URL: ${{ vars.SERVICE_URL }}
        run: |
          echo "Running E2E tests against $SERVICE_URL"
          echo "E2E test runner is not wired yet; failing deploy gate."
          exit 1
